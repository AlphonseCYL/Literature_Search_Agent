name: paper-search-project
services:
  redis:
    image: alphonse_redis:latest
    container_name: alphonse-redis-container
    ports:
      - "6379:6379"
    volumes:
      - E:/Program Files/Redis/conf/redis.conf:/etc/redis/redis.conf
      - ./redis-data:/data
    command: redis-server /etc/redis/redis.conf