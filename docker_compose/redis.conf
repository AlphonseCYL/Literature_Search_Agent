# 允许远程连接
bind 0.0.0.0
# bind 127.0.0.1

# 保护模式开启
protected-mode yes
# 默认端口
port 6379

# 设置最大客户端连接数（可选）
# tcp-backlog 511

# 设置客户端连接超时时间（单位：秒），0 表示永不超时
# timeout 0

# 设置 TCP 连接的 keepalive 时间（单位：秒），0 表示禁用
# tcp-keepalive 300

# 日志级别（可选，默认为 notice）
# loglevel notice

# 日志文件路径（可选，默认为空，表示输出到标准输出）
# logfile ""

# 数据库数量（默认 16 个）
databases 12

# 禁用 Redis 启动时显示的欢迎信息（可选）
always-show-logo yes

# 禁用危险命令（可选，防止被恶意清空或修改配置）
rename-command FLUSHDB ""
rename-command CONFIG ""

# 【核心】设置密码（Redis 6.0 及以上版本支持 ACL 多用户）
# 1. 禁用默认的无密码用户
# user default off
# 2. 创建一个名为 admin 的用户，密码是 0000，拥有所有权限
# redis 5.x 及以下版本使用以下方式设置密码（不推荐，因为安全性较差）
requirepass 0000